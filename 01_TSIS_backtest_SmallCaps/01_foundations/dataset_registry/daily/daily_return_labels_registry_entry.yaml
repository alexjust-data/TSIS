  generator_script: scripts/materialize_daily_return_labels.py

physical_layout:
  canonical_root: E:/TSIS/data/daily_return_labels
  layout_pattern: ticker=<TICKER>/year=<YYYY>/day_aggs_<TICKER>_<YYYY>_labels.parquet
  source_root: E:/TSIS/data/ohlcv_daily_adjusted

source_semantics:
  required_price_view: daily_adjusted_v0_1
  required_close_col: c_adjusted
  forbidden_close_col: c

initial_labels:
  - ret_1d
  - ret_3d
  - ret_5d

coverage_snapshot:
  observed_tickers:
    - A
    - AAME
    - ABEO
    - ABIO
    - ABTX
    - BBW
    - CASS
    - CVLY
    - SELF
    - SGC
  observed_parquets: 177
  observed_year_min: 2005
  observed_year_max: 2026
  observed_rows_from_summary: 41487
  summary_file: E:/TSIS/data/daily_return_labels/_labels_materialization_summary.csv

allowed_consumers:
  pilot_targets:
    - ml_target_pilot
    - label_quality_research
    - research_only
  planned_targets:
    - ml_target_candidate_after_lt1b_promotion
    - backtest_evaluation_candidate_after_lt1b_promotion
  restricted:
    - input_feature
    - backtest_core_without_lt1b_promotion
    - execution_simulator
    - rl_allowed
    - live_downstream_candidate

notes:
  - first real downstream consumer of daily_adjusted
  - this layer is a slow economic target layer, not an intraday execution signal
  - pilot covers 10 tickers only; it is not full-universe <1B>
  - ret_1d, ret_3d, ret_5d are targets/outcomes, never input features
  - future <1B> promotion must use a separate root and explicit anti-leakage policy
