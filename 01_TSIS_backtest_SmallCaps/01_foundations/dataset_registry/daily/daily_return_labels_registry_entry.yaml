status:
  promotion_state: pilot_materialization
  active: false
  owner: 01_TSIS_backtest_SmallCaps
  institutional_level: "pilot_target_layer"

registry_classification:
  dataset_family: model_target_layer
  primary_unit: ticker_day_label
  evidence_state: contract_defined_initial_generator

artifacts:
  dataset_contract: 01_foundations/contract_registry/dataset_contracts/daily_return_labels_dataset_contract_v0_1.md
  physical_schema_contract: 01_foundations/canonical_schemas/daily/daily_return_labels_schema_contract.md
  consumption_policy: 01_foundations/data_consumption_policies/daily_return_labels_consumption_policy.md
  lt1b_promotion_plan: 01_foundations/module_contracts/daily_return_labels_lt1b_promotion_plan_v0_1.md
