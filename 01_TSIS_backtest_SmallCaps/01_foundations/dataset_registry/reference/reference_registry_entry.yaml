quality_policy:
  good:
    - good_identity_snapshot
    - good_split_event
    - split_explains_trade_scale_mismatch
    - ticker_change_near_halt_when_market_reaction_is_coherent
  review:
    - review_transient_symbol
    - review_instrument_type_ambiguity
    - review_no_split_payload
    - split_near_scale_mismatch_review
    - ticker_change_near_quotes_anomaly
    - reference_event_near_halt_review
    - reference_event_near_quotes_review
    - identity_review_residual
  bad:
    - bad_unresolved_identity

allowed_consumers:
  permitted:
    - corporate_actions_service
    - price_view_builders
    - daily_adjusted
    - ohlcv_1m_split_normalized
    - universe_builder
    - lt1b_coverage_audits
    - event_engine
    - data_audit_overlay
    - forensic_review
    - research_only
  restricted:
    - backtest_core
    - backtest_extended
    - ml_flagged
    - execution_simulator
    - live_downstream_candidate
    - rl_allowed
  prohibited_without_new_contract:
    - treating_ticker_change_as_alpha_without_lag
    - treating_all_tickers_as_final_universe
    - treating_overview_market_cap_as_daily_pti_membership
    - treating_reference_as_price_or_execution_data

evidence_references:
  - 01_foundations/inspection_dossiers/reference/reference_institutional_closeout_v0_1.md
  - 01_research/01_auditoria_RAW_DATA/00_data_certification/auditoria/reference/04_reference_closeout.md
  - 01_research/01_auditoria_RAW_DATA/00_data_certification/auditoria/reference/04_reference_causal_overlay_closeout.md
  - 01_research/01_auditoria_RAW_DATA/00_data_certification/auditoria/reference/03_reference_root_cause_audit_phase1_closeout.md
  - 01_research/01_auditoria_RAW_DATA/00_data_certification/certification/reference/00_reference_current_state.md
  - 01_research/01_auditoria_RAW_DATA/00_data_certification/certification/reference/01_reference_causal_value.md
  - 01_research/01_auditoria_RAW_DATA/00_data_certification/certification/reference/02_reference_closeout.md
  - 01_foundations/inspection_dossiers/reference/reference_modernization_gap_audit_2026-06-12.md

known_limitations:
  - ticker_change_does_not_prove_economic_continuity_by_itself
  - ticker_change_near_quotes_anomaly_is_detector_not_clean_good_state
  - all_tickers_is_not_final_universe_membership
  - overview_market_cap_is_not_daily_fully_point_in_time_series
  - splits_explain_real_subset_not_global_residual
  - events_payload_must_be_exploded_before_event_level_validation

notes:
  - Reference is now locatable and consumable through foundations contracts, not only historical audit notes.
  - The current dossier is a compact foundation closeout, not yet a modern visual inspector pack at parity with daily/quotes/trades/minute.
  - The historical audit remains preserved and must not be reorganized for this promotion.