    all_tickers: E:/TSIS/data/reference/all_tickers
    overview: E:/TSIS/data/reference/overview
    events: E:/TSIS/data/reference/events
    splits: E:/TSIS/data/reference/splits
    dividends: E:/TSIS/data/reference/dividends
    exchanges: E:/TSIS/data/reference/exchanges
    ticker_types: E:/TSIS/data/reference/ticker_types
  layout_patterns:
    all_tickers: all_tickers/snapshot_date=YYYY-MM-DD.parquet
    ticker_partitioned: <subfamily>/ticker=<TICKER>/<subfamily>_<TICKER>[...].parquet
    global_tables: exchanges/exchanges.parquet, ticker_types/ticker_types.parquet
    operational_run: _run/*

